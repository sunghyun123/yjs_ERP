# Nginx 서버 블록 — erp.yjsboard.com
#
# [VPS 설정 순서]
#
# 1. 이 파일을 서버에 복사
#    sudo cp erp.yjsboard.com.conf /etc/nginx/sites-available/erp.yjsboard.com
#
# 2. 심볼릭 링크 생성
#    sudo ln -s /etc/nginx/sites-available/erp.yjsboard.com /etc/nginx/sites-enabled/
#
# 3. [중요] SSL 인증서 발급 전에는 아래 2단계로 진행:
#
#    3-1. 먼저 HTTP 블록만 활성화한 채로 nginx 재시작
#         sudo nginx -t && sudo systemctl reload nginx
#
#    3-2. Certbot으로 SSL 인증서 발급 (자동으로 이 파일에 SSL 설정 추가)
#         sudo certbot --nginx -d erp.yjsboard.com
#
# 4. 인증서 자동 갱신 확인
#    sudo certbot renew --dry-run
#
# 기존 yjsboard.com (포트 8000) 블록과 server_name이 다르므로 충돌 없음

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name erp.yjsboard.com;

    # Certbot 인증 챌린지용 (certbot이 자동 관리)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 블록
# [주의] Certbot 실행 전에는 아래 블록 전체를 주석 처리하고
#        certbot 실행 후 주석 해제 (certbot --nginx 사용 시 자동 처리됨)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name erp.yjsboard.com;

    # Certbot이 발급한 인증서 경로 (certbot 실행 후 자동 생성)
    ssl_certificate     /etc/letsencrypt/live/erp.yjsboard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/erp.yjsboard.com/privkey.pem;

    # Certbot 권장 SSL 설정 (certbot 실행 시 자동 추가됨)
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 요청 크기 제한 (Excel 업로드 등 고려)
    client_max_body_size 50M;

    # Next.js 프록시
    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;

        # WebSocket 지원 (Next.js HMR 및 실시간 기능)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # 실제 클라이언트 정보 전달
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # 타임아웃 (수주 전체 집계 등 무거운 쿼리 대응)
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Next.js 정적 파일 직접 서빙 (선택 사항 — 성능 최적화)
    # output: 'standalone' 미사용 시 아래 블록 제거해도 무방
    location /_next/static/ {
        proxy_pass http://localhost:3001;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
